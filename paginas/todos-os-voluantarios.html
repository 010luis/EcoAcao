<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=SUSE+Mono:ital,wght@0,100..800;1,100..800&display=swap"
        rel="stylesheet">
    <title>Todos os Voluntários - EcoAção</title>
</head>

<body>

    <!-- Navbar (IFRAME) -->
    <iframe src="../navbar.html"
        style="width: 100%; height: 129px; border: none; position: sticky; top: 0; z-index: 1000; background-color: var(--cor-fundo-principal);"
        title="Navegação"></iframe>

    <!-- Conteúdo da Página -->
    <div class="conteudo">

        <section class="flex-voluntarios" style="margin-top: 80px; max-width: 1400px;">
            <div class="voluntarios-topo">
                <h2 class="voluntarios-titulo">Todos os Voluntários</h2>
            </div>

            <p
                style="text-align: center; color: var(--cor-texto-principal); margin-bottom: 40px; max-width: 800px; margin-inline: auto;">
                Conheça todas as pessoas incríveis que dedicam seu tempo e esforço para ajudar nossa causa a crescer a
                cada dia mais.
            </p>

            <div class="voluntarios-itens"
                style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 40px; justify-content: center; padding: 20px;" id="container-voluntarios">


            </div>

            <div style="text-align: center; margin-top: 50px;">
                <a href="../index.html" class="voluntarios-botao"
                    style="position: static; display: inline-block; text-decoration: none;">Voltar para Início</a>
            </div>
        </section>

    </div> <!-- Fecha div conteudo -->


    <!-- Rodapé -->
    <iframe src="../rodape.html"
        style="width: 100%; height: 310px; border: none; margin-top: 50px; background-color: var(--cor-fundo-principal);"
        title="Rodapé"></iframe>

        <script>
    const container = document.getElementById('container-voluntarios');

    async function carregarVoluntarios() {
        try {
            // Faz a requisição para o seu servidor fake
            const resposta = await fetch('http://localhost:3000/voluntarios');
            const voluntarios = await resposta.json();

            // Limpa o container antes de carregar
            container.innerHTML = "";

            // Cria o HTML para cada voluntário recebido
            voluntarios.forEach(voluntario => {
                const card = `
                    <div class="voluntario-card">
                        <img src="${voluntario.avatar || './imagens/sem-avatar.jpg'}" alt="Voluntário">
                        <p class="voluntario-nome">${voluntario.nome}</p>
                    </div>
                `;
                container.innerHTML += card;
            });
        } catch (erro) {
            console.error("Erro ao buscar voluntários:", erro);
            container.innerHTML = "<p>Erro ao carregar voluntários.</p>";
        }
    }

    // Chama a função ao carregar a página
    carregarVoluntarios();
</script>
</body>

</html>
